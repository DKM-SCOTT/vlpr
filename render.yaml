services:
  - type: web
    name: vlpr
    runtime: python
    plan: starter # Upgrade from free tier - needed for ML models
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python -c "import nltk; nltk.download('punkt')"
    startCommand: gunicorn app:app --timeout 300 --workers 1 --threads 2 --memory-limit 1024
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vlpr-db
          property: connectionString
